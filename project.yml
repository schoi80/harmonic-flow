name: HarmonicFlow
options:
  bundleIdPrefix: com.schoi80
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
packages:
  TensorFlowLiteSwift:
    url: https://github.com/nethouse/TensorFlowLiteSwift.git
    branch: master
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  HarmonicFlow:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/HarmonicFlow
    dependencies:
      - package: TensorFlowLiteSwift
    info:
      path: Sources/HarmonicFlow/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.schoi80.HarmonicFlow
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO

  HarmonicFlowTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/HarmonicFlowTests
    dependencies:
      - target: HarmonicFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.schoi80.HarmonicFlowTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/HarmonicFlow.app/HarmonicFlow
        BUNDLE_LOADER: $(TEST_HOST)

  HarmonicFlowUITests:
    type: bundle.ui-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/HarmonicFlowUITests
    dependencies:
      - target: HarmonicFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.schoi80.HarmonicFlowUITests
        TEST_TARGET_NAME: HarmonicFlow
