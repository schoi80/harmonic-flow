name: HarmonicFlow
options:
  bundleIdPrefix: com.schoi80
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  TensorFlowLite:
    type: framework
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/TensorFlowLite
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.schoi80.HarmonicFlow.TensorFlowLite
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
  HarmonicFlow:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/HarmonicFlow
    dependencies:
      - target: TensorFlowLite
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.schoi80.HarmonicFlow
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_CFBundleDisplayName: HarmonicFlow
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "HarmonicFlow needs microphone access to transcribe vocal melodies into chord suggestions."
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "HarmonicFlow uses Bluetooth to send wireless MIDI to compatible instruments and apps."
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "HarmonicFlow uses the local network to publish and connect to RTP-MIDI sessions."
        INFOPLIST_KEY_NSSupportsLiveActivities: NO
        SUPPORTS_MACCATALYST: NO
